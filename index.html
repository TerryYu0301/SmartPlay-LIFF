<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智動創遊 - 遊戲方案創新設計</title>
    <style>
        /* 沿用你原本的精美樣式，僅針對新欄位做微調 */
        body { font-family: sans-serif; background-color: #f8f9fa; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 400px; margin: auto; }
        .logo { font-size: 24px; color: #5856d6; font-weight: bold; margin-bottom: 20px; display: flex; align-items: center; }
        label { display: block; margin-top: 15px; margin-bottom: 5px; color: #444; font-size: 14px; font-weight: bold; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background-color: #8e9aaf; color: white; border: none; border-radius: 15px; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        button:hover { background-color: #5856d6; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🎮 遊戲方案創新設計</div>
        <p style="color: #666; font-size: 14px;">為您量身打造專屬新玩法</p>

        <label>預計人數規模</label>
        <select id="scale">
            <option value="小規模">小規模 (10人以下)</option>
            <option value="中規模">中規模 (11-30人)</option>
            <option value="大規模">大規模 (30人以上)</option>
        </select>

        <label>活動動態偏好</label>
        <select id="dynamic">
            <option value="靜態">靜態 (解謎、推理)</option>
            <option value="中動態">中動態 (小跑、闖關)</option>
            <option value="高動態">高動態 (追逐、對戰)</option>
        </select>

        <label>預計活動時長</label>
        <select id="duration">
            <option value="短">短 (約 30-60 分鐘)</option>
            <option value="中">中 (約 1-2 小時)</option>
            <option value="長">長 (3 小時以上深度體驗)</option>
        </select>

        <label>具體活動地點</label>
        <input type="text" id="location" placeholder="例如：商學院 102 教室">

        <button id="submitBtn">開始規劃遊戲方案</button>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        // ⚠️ Production 網址（已移除 -test）
        const WEBHOOK_URL = 'https://untemptingly-psychopathological-daina.ngrok-free.dev/webhook/smartplay-search';

        async function initializeLiff() {
            await liff.init({ liffId: "2009929425-I5NNAcXK" });
            if (!liff.isLoggedIn()) {
                liff.login();
            }
        }

        initializeLiff();

        document.getElementById('submitBtn').addEventListener('click', async () => {
            const btn = document.getElementById('submitBtn');
            btn.innerText = "正在啟動系統...";
            btn.disabled = true;

            const profile = await liff.getProfile();
            const data = {
                userName: profile.displayName,
                scale: document.getElementById('scale').value,
                dynamic: document.getElementById('dynamic').value,
                duration: document.getElementById('duration').value, // ✨ 傳送時長
                location: document.getElementById('location').value || "未指定地點"
            };

            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                liff.closeWindow();
            } catch (err) {
                alert("系統啟動失敗，請檢查網路連線");
                btn.innerText = "開始規劃遊戲方案";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
