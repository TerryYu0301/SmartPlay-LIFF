<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPlay AI 遊戲設計師</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h1 class="text-2xl font-bold text-slate-800 mb-4">SmartPlay AI 遊戲規劃</h1>
        
        <form id="gameForm" class="space-y-4">
            <!-- 1. 人數選擇 -->
            <div>
                <label class="block text-sm font-medium text-slate-700">活動人數</label>
                <select id="peopleCount" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm p-2 bg-slate-100">
                    <option value="小">小 (1-10人)</option>
                    <option value="中">中 (11-30人)</option>
                    <option value="大">大 (30人以上)</option>
                </select>
            </div>

            <!-- 2. 場地需求 -->
            <div>
                <label class="block text-sm font-medium text-slate-700">場地類型</label>
                <select id="venueType" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm p-2 bg-slate-100">
                    <option value="室內">室內</option>
                    <option value="室外">室外</option>
                    <option value="皆可">不拘</option>
                </select>
            </div>

            <!-- 3. 動態程度 -->
            <div>
                <label class="block text-sm font-medium text-slate-700">動態程度</label>
                <select id="dynamism" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm p-2 bg-slate-100">
                    <option value="靜態">靜態 (坐著玩)</option>
                    <option value="中動態">中動態 (小範圍走動)</option>
                    <option value="高動態">高動態 (奔跑競技)</option>
                </select>
            </div>

            <!-- 4. 手動地點輸入 -->
            <div>
                <label class="block text-sm font-medium text-slate-700">具體地點 (手動輸入)</label>
                <input type="text" id="actualLocation" placeholder="例如：商學院 102 教室" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm p-2 bg-slate-100">
            </div>

            <button type="button" id="submitBtn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700">開始創新設計</button>
        </form>
    </div>

    <script>
        const MY_LIFF_ID = '2009929425-I5NNAcXK'; 
        const N8N_WEBHOOK_URL = 'https://untemptingly-psychopathological-daina.ngrok-free.dev/webhook/smartplay-search';

        async function initLIFF() {
            try {
                await liff.init({ liffId: MY_LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                }
            } catch (err) {
                console.error('LIFF 初始化失敗', err);
            }
        }

        document.getElementById('submitBtn').addEventListener('click', async () => {
            const profile = await liff.getProfile();
            const postData = {
                userId: profile.userId,
                userName: profile.displayName,
                people: document.getElementById('peopleCount').value,
                venue: document.getElementById('venueType').value,
                dynamism: document.getElementById('dynamism').value,
                location: document.getElementById('actualLocation').value
            };

            // 顯示處理中
            document.getElementById('submitBtn').innerText = 'AI 正在研發中...';
            document.getElementById('submitBtn').disabled = true;

            try {
                const response = await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'ngrok-skip-browser-warning': 'true' // 跳過 ngrok 警告
                    },
                    body: JSON.stringify(postData)
                });
                
                if (response.ok) {
                    alert('提案已準備好，請回 LINE 聊天室查看！');
                }
            } catch (err) {
                alert('連線失敗，請確認 ngrok 是否開啟');
            } finally {
                document.getElementById('submitBtn').innerText = '開始創新設計';
                document.getElementById('submitBtn').disabled = false;
            }
        });

        initLIFF();
    </script>
</body>
</html>
