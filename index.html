<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPlay AI 行政代理人</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #219150; }
        #result-area { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; }
        .loading { text-align: center; color: #7f8c8d; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎮 SmartPlay AI 代理人</h2>
    <p>歡迎，<span id="userName">讀取中...</span>！請輸入活動需求：</p>
    
    <div class="form-group">
        <label>活動人數</label>
        <input type="number" id="peopleCount" placeholder="例如：40">
    </div>

    <div class="form-group">
        <label>活動類型</label>
        <select id="activityType">
            <option value="高">高動態競技 (跑跳、大動作)</option>
            <option value="中">中動態遊戲 (分組對抗、互動)</option>
            <option value="靜態">腦力實境解謎 (靜態思維)</option>
        </select>
    </div>

    <div class="form-group">
        <label>預計地點</label>
        <input type="text" id="location" value="三峽校區商學院" placeholder="請輸入地點">
    </div>

    <button id="submitBtn" onclick="submitToN8N()">開始智慧規劃</button>

    <div id="loading" class="loading" style="display:none;">AI 正在翻閱資料庫並規劃中...</div>
    <div id="result-area"></div>
</div>

<script>
    // --- 串接位子 1：請填入你的 LIFF ID ---
    const MY_LIFF_ID = '2009929425-I5NNacXK';
    // --- 串接位子 2：請填入你的 n8n Webhook URL ---
    const N8N_WEBHOOK_URL = 'https://untemptingly-psychopathological-daina.ngrok-free.dev/webhook/smartplay-search'; 

    async function initializeLiff() {
        try {
            await liff.init({ liffId: MY_LIFF_ID });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                document.getElementById('userName').innerText = profile.displayName;
            } else {
                liff.login();
            }
        } catch (err) {
            console.error('LIFF 初始化失敗', err);
        }
    }

    async function submitToN8N() {
        const people = document.getElementById('peopleCount').value;
        const type = document.getElementById('activityType').value;
        const loc = document.getElementById('location').value;
        const user = document.getElementById('userName').innerText;

        if (!people) return alert("請輸入人數！");

        // 顯示載入狀態
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('loading').style.display = 'block';
        document.getElementById('result-area').style.display = 'none';

        const payload = {
            activityType: type, // 對應 Excel 的「動態」欄位
            peopleCount: people,
            location: loc,
            userName: user
        };

        try {
            const response = await fetch(N8N_WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                const data = await response.json();
                displayResult(data);
            } else {
                alert("n8n 伺服器反應異常，請檢查流程是否已發佈(Publish)。");
            }
        } catch (error) {
            alert("連線失敗：" + error.message);
        } finally {
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('loading').style.display = 'none';
        }
    }

    function displayResult(data) {
        const resultArea = document.getElementById('result-area');
        resultArea.style.display = 'block';
        resultArea.style.background = '#e8f5e9';
        
        // 假設你的 AI Agent 輸出的文字欄位叫做 output 或 text
        const aiText = data.output || data.text || JSON.stringify(data);
        
        resultArea.innerHTML = `
            <h3 style="color: #27ae60;">✨ AI 規劃結果</h3>
            <div style="white-space: pre-wrap; line-height: 1.6;">${aiText}</div>
            <button onclick="location.reload()" style="margin-top:10px; background:#95a5a6;">重新規劃</button>
        `;
    }

    initializeLiff();
</script>

</body>
</html>
