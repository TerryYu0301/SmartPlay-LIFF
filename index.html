<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPlay AI 遊戲設計師</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4">
    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-xl p-8">
        <h2 class="text-2xl font-bold text-indigo-800 mb-2">🎮 遊戲方案創新設計</h2>
        <p class="text-slate-500 text-sm mb-6">為您量身打造專屬新玩法</p>
        
        <form id="gameForm" class="space-y-6">
            <!-- 1. 人數對齊 (小/中/大) -->
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">預計人數規模</label>
                <select id="people" class="w-full border-2 border-slate-100 rounded-xl p-3 focus:border-indigo-500 outline-none">
                    <option value="">-- 請選擇人數 --</option>
                    <option value="小">小 (1-10人)</option>
                    <option value="中">中 (11-30人)</option>
                    <option value="大">大 (30人以上)</option>
                </select>
            </div>

            <!-- 2. 動態程度 (靜態/中動態/高動態) -->
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">活動動態偏好</label>
                <select id="dynamism" class="w-full border-2 border-slate-100 rounded-xl p-3 focus:border-indigo-500 outline-none">
                    <option value="">-- 請選擇動態程度 --</option>
                    <option value="靜態">靜態 (文靜思考)</option>
                    <option value="中動態">中動態 (小範圍互動)</option>
                    <option value="高動態">高動態 (奔跑競技)</option>
                </select>
            </div>

            <!-- 3. 地點 (手動輸入) -->
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">具體活動地點</label>
                <input type="text" id="location" placeholder="例如：商學院 102 教室" 
                       class="w-full border-2 border-slate-100 rounded-xl p-3 focus:border-indigo-500 outline-none">
            </div>

            <button type="button" id="startBtn" 
                    class="w-full bg-slate-400 text-white font-bold py-4 rounded-2xl shadow-lg transition-all">
                正在啟動系統...
            </button>
        </form>
    </div>

    <script>
        // 嚴格採用你指定的 ID
        const MY_LIFF_ID = '2009929425-I5NNacXK'; 
        const WEBHOOK_URL = 'https://untemptingly-psychopathological-daina.ngrok-free.dev/webhook/smartplay-search';

        async function initializeLiff() {
            try {
                await liff.init({ liffId: MY_LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    console.log("LIFF 已就緒");
                    setButtonReady();
                }
            } catch (err) {
                console.error('LIFF 初始化失敗', err);
                // 即使失敗也嘗試解鎖按鈕讓使用者能點擊，以便觀察報錯
                setButtonReady();
            }
        }

        function setButtonReady() {
            const btn = document.getElementById('startBtn');
            btn.innerText = '開始創新設計';
            btn.classList.remove('bg-slate-400');
            btn.classList.add('bg-indigo-600', 'hover:bg-indigo-700');
        }

        document.getElementById('startBtn').addEventListener('click', async () => {
            // 1. 防呆提醒邏輯
            const people = document.getElementById('people').value;
            const dynamism = document.getElementById('dynamism').value;
            const location = document.getElementById('location').value;

            if (!people || !dynamism || !location) {
                alert('請完整填寫人數、動態程度與地點喔！');
                return;
            }

            const btn = document.getElementById('startBtn');
            btn.disabled = true;
            btn.innerText = 'AI 正在融合遊戲庫發想中...';

            try {
                const profile = await liff.getProfile();
                const payload = {
                    userId: profile.userId,
                    userName: profile.displayName,
                    people: people,
                    dynamism: dynamism,
                    location: location
                };

                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'ngrok-skip-browser-warning': 'true' 
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert('創新方案已送達！請回聊天室確認。');
                } else {
                    alert('伺服器目前有點忙碌，請稍後再試。');
                }
            } catch (err) {
                console.error(err);
                alert('連線失敗，請檢查 ngrok 是否正常開啟。');
            } finally {
                btn.disabled = false;
                btn.innerText = '開始創新設計';
            }
        });

        initializeLiff();
    </script>
</body>
</html>
